name: Newsletter Semanal

on:
  schedule:
    # Cada viernes a las 21:00 UTC (18:00 Argentina)
    - cron: '0 21 * * 5'
  workflow_dispatch: # Permite ejecución manual desde GitHub Actions

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Enviar newsletter semanal
        run: |
          echo "Disparando newsletter semanal..."
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.SITE_URL }}/api/newsletter/send" \
            -H "Authorization: Bearer ${{ secrets.NEWSLETTER_SECRET }}" \
            -H "Content-Type: application/json")

          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "Error: El endpoint retornó HTTP $RESPONSE"
            exit 1
          fi

          ENVIADOS=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('enviados', 0))")
          echo "Newsletter enviado exitosamente a $ENVIADOS suscriptores."
