<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 110" fill="none" role="img" aria-label="Neco Now">
  <title>Neco Now</title>

  <!-- BURBUJA verde -->
  <rect x="1" y="1" width="88" height="88" rx="15" ry="15" fill="#0B7F71"/>
  <polygon points="10,89 1,110 34,89" fill="#0B7F71"/>

  <!-- LETRA N blanca interior -->
  <rect x="17" y="18" width="12" height="54" fill="#FFFFFF"/>
  <rect x="61" y="18" width="12" height="54" fill="#FFFFFF"/>
  <polygon points="17,18 29,18 73,72 61,72" fill="#FFFFFF"/>

  <!-- SEPARADOR verde — va de y=8 a y=90 (largo=82) -->
  <rect x="101" y="8" width="3" height="82" rx="1.5" fill="#0B7F71"/>

  <!-- NECO — centrado en la mitad superior del separador: y=8 a y=49, centro=28, baseline aprox +32 -->
  <text x="113" y="48"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-weight="900"
    font-size="40"
    fill="#FFFFFF"
    letter-spacing="-1">NECO</text>

  <!-- NOW — centrado en la mitad inferior: y=49 a y=90, centro=69, baseline aprox +32 -->
  <text x="113" y="90"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-weight="900"
    font-size="40"
    fill="#FFFFFF"
    letter-spacing="-1">NOW</text>

</svg>
