<svg xmlns="http://www.w3.org/2000/svg" 
     viewBox="0 0 480 180" 
     fill="none" 
     role="img" 
     aria-label="Neco Now — Noticias de Necochea">
  <title>Neco Now</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&amp;display=swap');
      .logo-text { font-family: 'Barlow Condensed', 'Arial Black', sans-serif; font-weight: 900; }
    </style>
  </defs>

  <!-- BURBUJA -->
  <rect x="2" y="2" width="148" height="148" rx="24" ry="24" fill="#0B7F71"/>
  <polygon points="16,150 2,180 56,150" fill="#0B7F71"/>

  <!-- N interior -->
  <rect x="28" y="30" width="20" height="90" fill="#FFFFFF"/>
  <rect x="104" y="30" width="20" height="90" fill="#FFFFFF"/>
  <polygon points="28,30 48,30 124,120 104,120" fill="#FFFFFF"/>

  <!-- SEPARADOR -->
  <rect x="172" y="12" width="5" height="136" rx="2.5" fill="#0B7F71"/>

  <!-- TEXTO NECO -->
  <text class="logo-text" x="188" y="88" 
        font-size="82" fill="#FFFFFF" 
        dominant-baseline="auto" 
        letter-spacing="-1">NECO</text>

  <!-- TEXTO NOW -->
  <text class="logo-text" x="188" y="170" 
        font-size="82" fill="#FFFFFF" 
        dominant-baseline="auto" 
        letter-spacing="-1">NOW</text>
</svg>
